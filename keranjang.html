
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keranjang — IKAMABA Hub</title>
  <link rel="stylesheet" href="assets/css/ikamaba.css">
</head>
<body>

  <!-- ═══ NAVBAR ═══ -->
  <nav class="navbar navbar-dark" id="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">
        <img src="assets/img/logo.svg" alt="IKAMABA Logo">
        <span>IKAMABA</span>
      </a>
      <div class="nav-menu" id="navMenu">
        <a href="index.html" class="nav-link">Beranda</a>
        <a href="index.html#tentang" class="nav-link">Tentang</a>
        <a href="index.html#event" class="nav-link">Event</a>
        <a href="merch.html" class="nav-link">Merch</a>
        <a href="http://localhost/uas_ui/blog-ikamaba/" class="nav-link">Artikel</a>
      </div>
      <div class="nav-actions">
        <a href="admin/login.html" class="btn btn-primary btn-sm hide-tablet">Login</a>
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
      </div>
    </div>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html" class="nav-link">Beranda</a>
    <a href="index.html#tentang" class="nav-link">Tentang</a>
    <a href="index.html#event" class="nav-link">Event</a>
    <a href="merch.html" class="nav-link">Merch</a>    <a href="http://localhost/uas_ui/blog-ikamaba/" class="nav-link">Artikel</a>    <a href="admin/login.html" class="btn btn-primary" style="margin-top:1rem;">Login</a>
  </div>

  <!-- ═══ BREADCRUMB ═══ -->
  <section class="page-hero">
    <div class="container">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">Beranda</a>
        <span class="separator">/</span>
        <span class="current">Keranjang</span>
      </nav>
      <h1>Keranjang Belanja</h1>
    </div>
  </section>

  <!-- ═══ CART CONTENT ═══ -->
  <section class="section">
    <div class="container" id="cartContainer">
      <!-- Items will be injected here via JS -->
    </div>
  </section>

  <!-- ═══ EMPTY CART (Hidden by default) ═══ -->
  <section id="emptyCart" style="padding: var(--space-16) 0; text-align: center; display: none;">
    <div class="container">
      <div style="font-size: 5rem; margin-bottom: 1.5rem;">🛒</div>
      <h2 style="font-family: var(--font-heading); font-size: var(--text-2xl); margin-bottom: 0.75rem;">Keranjang Kosong</h2>
      <p style="color: var(--gray-500); margin-bottom: 2rem; max-width: 400px; margin-left: auto; margin-right: auto;">Belum ada produk di keranjang. Yuk, jelajahi katalog produk IKAMABA!</p>
      <a href="merch.html" class="btn btn-primary btn-lg">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Mulai Belanja
      </a>
    </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 IKAMABA Hub. Hak cipta dilindungi.</p>
      </div>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
  <script>
    // Dummy Data untuk Presentasi
    let cartItems = [
      { id: '1', name: 'Hoodie IKAMABA', price: 250000, qty: 1, img: 'assets/img/hoodie.png' },
      { id: '3', name: 'Totebag IKAMABA', price: 85000, qty: 4, img: 'assets/img/totebag.png' }
    ];

    document.addEventListener('DOMContentLoaded', renderCart);

    function renderCart() {
      const cartContainer = document.getElementById('cartContainer');
      const emptyCart = document.getElementById('emptyCart');

      if (cartItems.length === 0) {
        cartContainer.style.display = 'none';
        emptyCart.style.display = 'block';
        return;
      }

      emptyCart.style.display = 'none';
      cartContainer.style.display = 'grid';
      cartContainer.style.gridTemplateColumns = '2fr 1fr';
      cartContainer.style.gap = 'var(--space-8)';

      let subtotal = 0;
      let itemsHtml = '<div style="display: flex; flex-direction: column; gap: var(--space-4);">';

      cartItems.forEach(item => {
        const itemTotal = item.price * item.qty;
        subtotal += itemTotal;
        itemsHtml += `
          <div style="display: flex; align-items: center; gap: var(--space-4); background: var(--white); padding: var(--space-4); border-radius: var(--radius-lg); border: 1px solid var(--gray-200);">
            <div style="width: 80px; height: 80px; border-radius: var(--radius-sm); flex-shrink: 0; overflow: hidden; background: var(--gray-100);">
              <img src="${item.img || 'assets/img/logo.png'}" alt="${item.name}" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div style="flex: 1;">
              <h4 style="font-family: var(--font-accent); font-weight: 600; margin-bottom: var(--space-1);">${item.name}</h4>
              <p style="color: var(--maroon); font-weight: 600;">Rp ${item.price.toLocaleString('id-ID')}</p>
            </div>
            <div style="display: flex; flex-direction: column; align-items: flex-end; gap: var(--space-2);">
              <div style="display: flex; align-items: center; gap: var(--space-2);">
                <button class="btn btn-ghost btn-sm" onclick="updateItemQty('${item.id}', ${item.qty - 1})" style="padding: var(--space-1);">-</button>
                <span style="font-family: var(--font-accent); font-weight: 600; width: 24px; text-align: center;">${item.qty}</span>
                <button class="btn btn-ghost btn-sm" onclick="updateItemQty('${item.id}', ${item.qty + 1})" style="padding: var(--space-1);">+</button>
              </div>
              <button onclick="removeItem('${item.id}')" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: var(--text-sm); display: flex; align-items: center; gap: var(--space-1);">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                Hapus
              </button>
            </div>
          </div>
        `;
      });
      itemsHtml += '</div>';

      const layanan = 5000;
      const total = subtotal + layanan;

      const summaryHtml = `
        <div style="background: var(--white); padding: var(--space-6); border-radius: var(--radius-lg); border: 1px solid var(--gray-200); position: sticky; top: 100px;">
          <h3 style="font-family: var(--font-accent); font-weight: 700; font-size: var(--text-lg); margin-bottom: var(--space-4);">Ringkasan Pesanan</h3>
          
          <div style="display: flex; justify-content: space-between; margin-bottom: var(--space-2);">
            <span style="color: var(--gray-600);">Subtotal</span>
            <span style="font-weight: 600;">Rp ${subtotal.toLocaleString('id-ID')}</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: var(--space-4);">
            <span style="color: var(--gray-600);">Biaya Layanan</span>
            <span style="font-weight: 600;">Rp ${layanan.toLocaleString('id-ID')}</span>
          </div>
          
          <div style="border-top: 1px dashed var(--gray-300); padding-top: var(--space-4); margin-bottom: var(--space-6); display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 700; font-size: var(--text-lg);">Total</span>
            <span style="font-weight: 700; font-size: var(--text-xl); color: var(--maroon);">Rp ${total.toLocaleString('id-ID')}</span>
          </div>

          <button onclick="checkout()" class="btn btn-primary" style="width: 100%; justify-content: center; margin-bottom: var(--space-3);">Lanjut Pembayaran</button>
          <a href="merch.html" class="btn btn-ghost" style="width: 100%; justify-content: center;">Lanjut Belanja</a>
        </div>
      `;

      if (window.innerWidth <= 768) {
        cartContainer.style.gridTemplateColumns = '1fr';
      }

      cartContainer.innerHTML = itemsHtml + summaryHtml;
    }

    function updateItemQty(id, newQty) {
      if (newQty < 1) {
        removeItem(id);
      } else {
        const item = cartItems.find(i => i.id === id);
        if (item) item.qty = newQty;
        renderCart();
      }
    }

    function removeItem(id) {
      cartItems = cartItems.filter(i => i.id !== id);
      showToast('Produk dihapus dari keranjang', 'success');
      renderCart();
    }

    function checkout() {
      showToast('Melanjutkan ke pembayaran...', 'info');
      setTimeout(() => {
        window.location.href = 'pembayaran.html';
      }, 1500);
    }
  </script>
</body>
</html>
