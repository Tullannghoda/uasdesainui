<!DOCTYPE html>

  <section class="section" style="padding-top: 120px;">
    <div class="container dashboard-layout">
      
      <!-- Sidebar -->
      <aside class="user-sidebar">
        <div class="user-profile-header">
          <div class="user-avatar">UD</div>
          <h3 style="font-family: var(--font-accent); font-weight: 700; color: var(--white);">Ucok Dolok</h3>

            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>

              </div>
              <span class="badge badge-info">Sedang Diproses</span>
            </div>
            <div class="order-product" style="display: flex; gap: var(--space-4); align-items: center;">
              <div style="width: 60px; height: 60px; background: var(--gray-100); border-radius: var(--radius-sm); overflow: hidden;">
                <img src="assets/img/hoodie.png" alt="Produk" style="width: 100%; height: 100%; object-fit: cover;">
